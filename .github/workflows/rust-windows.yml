name: Build for Windows x86_64

# on:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]

on: workflow_dispatch

env:
  OPENCV_VERSION: 4.11.0

jobs:
  build-x86_64:
    name: Build for x86_64 Windows
    runs-on: [self-hosted, Windows]

    steps:
      - uses: actions/checkout@v4

      - name: Chocolatey Action
        uses: crazy-max/ghaction-chocolatey@v3.0.0
        with:
          # Arguments to pass to Chocolatey
          # don't install opencv here as we build the staticlib below
          args: install -y llvm wget strawberryperl unzip cmake opencl-intel-cpu-runtime
          # Docker image to use
          #image: # optional, default is ghcr.io/crazy-max/ghaction-chocolatey

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache OpenCV build
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: |
            opencv-install
            opencv-${{ env.OPENCV_VERSION }}
            opencv_contrib-${{ env.OPENCV_VERSION }}
            build
          key: opencv-${{ env.OPENCV_VERSION }}-windows-x64

      - name: Install OpenCV static lib
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        shell: bash
        run: |
          wget -O opencv.zip https://github.com/opencv/opencv/archive/refs/tags/${OPENCV_VERSION}.zip
          wget -O opencv_contrib.zip https://github.com/opencv/opencv_contrib/archive/refs/tags/${OPENCV_VERSION}.zip
          unzip opencv.zip
          rm opencv.zip
          unzip opencv_contrib.zip
          rm opencv_contrib.zip
          mkdir -p build
          cd build
          # Updated CMAKE_INSTALL_PREFIX to point to opencv-install in workspace
          cmake -D CMAKE_BUILD_TYPE=Release -D BUILD_WITH_STATIC_CRT=ON -D BUILD_SHARED_LIBS=OFF -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/opencv-install" -D BUILD_CUDA_STUBS=OFF ... [rest of your flags] ... ../opencv-${{ env.OPENCV_VERSION }}
          cmake --build . --target install --config Release --parallel 12
          cmake --install . --prefix "${{ github.workspace }}/opencv-install"
          cd ..

      - name: Verify Library Locations (Diagnostic)
        run: |
          Write-Host "Searching for installed .lib files..."
          Get-ChildItem -Path "${{ github.workspace }}/opencv-install" -Filter "*.lib" -Recurse | Select-Object FullName

      # - name: Build
      #   run: |
      #     $env:OPENCV_LINK_LIBS="opencv_highgui4110,opencv_videoio4110,opencv_imgcodecs4110,opencv_imgproc4110,opencv_core4110,ippiw,ittnotify,ippicvmt,zlib,libjpeg-turbo,libwebp,libpng,libtiff,libopenjp2,comctl32,gdi32,ole32,setupapi,ws2_32,vfw32,user32,advapi32,oleaut32,uuid,comdlg32"

      #     # Provide multiple likely search paths separated by commas
      #     $env:OPENCV_LINK_PATHS="${{ github.workspace }}/opencv-install/x64/vc17/staticlib,${{ github.workspace }}/opencv-install/x64/vc17/lib,${{ github.workspace }}/opencv-install/staticlib,${{ github.workspace }}/opencv-install/lib,${{ github.workspace }}/opencv-install/x64/vc17/staticlib/3rdparty"

      #     $env:OPENCV_INCLUDE_PATHS="${{ github.workspace }}/opencv-install/include"
      #     $env:OPENCV_MSVC_CRT="static"

      #     cargo clean
      #     cargo build --release

      - name: Build
        run: |
          $env:OPENCV_LINK_LIBS="opencv_highgui4110,opencv_videoio4110,opencv_imgcodecs4110,opencv_imgproc4110,opencv_core4110,ippiw,ittnotify,ippicvmt,zlib,libjpeg-turbo,libwebp,libpng,libtiff,libopenjp2,comctl32,gdi32,ole32,setupapi,ws2_32,vfw32,user32,advapi32,oleaut32,uuid,comdlg32"
          # $env:OPENCV_LINK_LIBS=$(Get-ChildItem -Path C:\tools -Recurse -Filter 'opencv_world*.lib' | Select-Object -first 1 | Select-Object -ExpandProperty Name)
          $env:OPENCV_LINK_PATHS="C:/opt/opencv/x64/vc17/staticlib"
          $env:OPENCV_INCLUDE_PATHS="C:/opt/opencv/include"
          $env:OPENCV_MSVC_CRT="static"
          cargo clean
          cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64
          path: target/release/svled.exe
